name: Run Qwen2.5-Se Model Inference

on:
  push:
    paths:
      - 'task.txt'
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      prompt:
        description: '输入提示词'
        required: true
        default: '你好'

jobs:
  parse-config:
    runs-on: ubuntu-latest
    outputs:
      prompt: ${{ steps.parse.outputs.PROMPT }}
      temperature: ${{ steps.parse.outputs.TEMPERATURE }}
      top_p: ${{ steps.parse.outputs.TOP_P }}
      top_k: ${{ steps.parse.outputs.TOP_K }}
      max_tokens: ${{ steps.parse.outputs.MAX_TOKENS }}
      system_message: ${{ steps.parse.outputs.SYSTEM_MESSAGE }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Parse task.txt
        id: parse
        run: |
          if [ -f "task.txt" ]; then
            while IFS='=' read -r key value; do
              [[ $key =~ ^#.*$ ]] && continue
              [[ -z $key ]] && continue
              value=$(echo "$value" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//;s/^"//;s/"$//')
              echo "${key}=${value}" >> $GITHUB_OUTPUT
            done < task.txt
          fi

  run-inference:
    needs: parse-config
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-qwen2.5-sex-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            hf-models-qwen2.5-sex-${{ runner.os }}-

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install transformers>=4.44.2 accelerate huggingface_hub

      - name: Download model
        run: |
          python -c "
          from huggingface_hub import snapshot_download
          snapshot_download('ystemsrx/Qwen2.5-Sex', resume_download=True)
          print('模型下载完成')
          "

      - name: 🚀 Run inference
        run: |
          python -c "
          import torch
          from transformers import AutoModelForCausalLM, AutoTokenizer
          from datetime import datetime

          prompt = '''${{ needs.parse-config.outputs.prompt || '你好' }}'''
          temperature = ${{ needs.parse-config.outputs.temperature || 0.3 }}
          top_p = ${{ needs.parse-config.outputs.top_p || 0.9 }}
          top_k = ${{ needs.parse-config.outputs.top_k || 80 }}
          max_tokens = ${{ needs.parse-config.outputs.max_tokens || 512 }}
          system_message = '''${{ needs.parse-config.outputs.system_message || '' }}'''

          print('=' * 60)
          print('Qwen2.5-Sex 模型推理')
          print('=' * 60)
          print(f'提示词: {prompt}')

          model_name = 'ystemsrx/Qwen2.5-Sex'
          print(f'\n正在加载模型: {model_name}')
          
          tokenizer = AutoTokenizer.from_pretrained(model_name, trust_remote_code=True)
          model = AutoModelForCausalLM.from_pretrained(
              model_name,
              dtype=torch.float32,
              device_map='cpu',
              trust_remote_code=True,
              low_cpu_mem_usage=True
          )
          print('模型加载完成！')

          messages = []
          if system_message:
              messages.append({'role': 'system', 'content': system_message})
          messages.append({'role': 'user', 'content': prompt})

          text = tokenizer.apply_chat_template(messages, tokenize=False, add_generation_prompt=True)
          inputs = tokenizer([text], return_tensors='pt')

          print('正在生成响应...')
          with torch.no_grad():
              outputs = model.generate(
                  inputs.input_ids,
                  max_new_tokens=max_tokens,
                  top_p=top_p,
                  top_k=top_k,
                  temperature=temperature,
                  do_sample=True,
                  pad_token_id=tokenizer.eos_token_id
              )

          response = tokenizer.decode(outputs[0][len(inputs.input_ids[0]):], skip_special_tokens=True)

          print('=' * 60)
          print(response)
          print('=' * 60)

          timestamp = datetime.now().strftime('%Y-%m-%d %H:%M:%S')
          with open('inference_output.txt', 'w', encoding='utf-8') as f:
              f.write(f'# Qwen2.5-Se 推理结果\n\n')
              f.write(f'**生成时间**: {timestamp}\n\n')
              f.write(f'**提示词**:\n{prompt}\n\n')
              f.write(f'**参数**:\n')
              f.write(f'- temperature: {temperature}\n')
              f.write(f'- top_p: {top_p}\n')
              f.write(f'- top_k: {top_k}\n')
              f.write(f'- max_tokens: {max_tokens}\n')
              if system_message:
                  f.write(f'- system_message: {system_message}\n')
              f.write(f'\n---\n\n')
              f.write(f'**响应**:\n{response}\n')
          "

      - name: Upload result to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: inference-output
          path: inference_output.txt
          retention-days: 7

      - name: Push result to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add inference_output.txt
          git commit -m "📝 Update inference result [skip ci]" || echo "No changes to commit"
          git push 