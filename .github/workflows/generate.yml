name: 豆包批量生图

on:
  push:
    paths:
      - 'task.txt'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install requests numpy opencv-python-headless pillow scikit-learn

      - name: 创建兼容模块
        run: |
          mkdir -p common bridge
          cat > common/log.py << 'PYEOF'
          import logging, sys
          logger = logging.getLogger("doubao")
          logger.setLevel(logging.INFO)
          if not logger.handlers:
              handler = logging.StreamHandler(sys.stdout)
              handler.setFormatter(logging.Formatter('%(asctime)s [%(levelname)s] %(message)s'))
              logger.addHandler(handler)
          PYEOF
          touch common/__init__.py
          touch bridge/__init__.py
          echo "✅ 兼容模块已创建"

      - name: 修复模块导入
        run: |
          python3 << 'PYEOF'
          import os
          for fp in ['module/image_processor.py','module/image_storage.py','module/image_uploader.py','module/token_manager.py','module/api_client.py','doubao.py']:
              if os.path.exists(fp):
                  with open(fp,'r') as f: c = f.read()
                  old = 'from common.log import logger'
                  new = 'try:\n    from common.log import logger\nexcept ImportError:\n    import logging\n    logger = logging.getLogger(__name__)'
                  if old in c:
                      with open(fp,'w') as f: f.write(c.replace(old,new))
                      print(f'✅ {fp}')
                  else: print(f'⏭️  {fp}')
              else: print(f'⚠️  {fp} 不存在')
          PYEOF

      - name: 修复 api_client.py 响应解析
        run: |
          python3 << 'PYEOF'
          import os

          fp = 'module/api_client.py'
          if not os.path.exists(fp):
              print(f'❌ 文件不存在: {fp}')
              exit(1)

          with open(fp, 'r', encoding='utf-8') as f:
              content = f.read()

          # 修复1: event_data 类型安全处理
          old1 = '''event_data = json.loads(data.get("event_data", "{}"))
                      logger.debug(f"[Doubao] Response event_data: {event_data}")'''
          
          new1 = '''event_data_raw = data.get("event_data", "{}")
                      if isinstance(event_data_raw, str):
                          try:
                              event_data = json.loads(event_data_raw)
                          except json.JSONDecodeError:
                              logger.warning(f"[Doubao] event_data 不是合法 JSON: {str(event_data_raw)[:200]}")
                              continue
                      else:
                          event_data = event_data_raw
                      if not isinstance(event_data, dict):
                          continue
                      logger.debug(f"[Doubao] Response event_data: {event_data}")'''

          if old1 in content:
              content = content.replace(old1, new1)
              print('✅ 修复1: event_data 类型安全')
          else:
              print('⚠️  修复1: 未找到匹配代码')

          # 修复2: message 类型安全处理
          old2 = '''if "message" in event_data:
                          message = event_data["message"]
                          logger.debug(f"[Doubao] Message data: {message}")
                          if message.get("content_type") == 2010:'''
          
          new2 = '''if "message" in event_data:
                          message = event_data["message"]
                          if isinstance(message, str):
                              try:
                                  message = json.loads(message)
                              except json.JSONDecodeError:
                                  continue
                          if not isinstance(message, dict):
                              continue
                          logger.debug(f"[Doubao] Message data: {message}")
                          if message.get("content_type") == 2010:'''

          if old2 in content:
              content = content.replace(old2, new2)
              print('✅ 修复2: message 类型安全')
          else:
              print('⚠️  修复2: 未找到匹配代码')

          # 修复3: content 类型安全处理
          old3 = '''content = json.loads(message["content"])
                                  if "data" in content:'''
          
          new3 = '''content_raw = message["content"]
                                  if isinstance(content_raw, str):
                                      try:
                                          content = json.loads(content_raw)
                                      except json.JSONDecodeError:
                                          continue
                                  else:
                                      content = content_raw
                                  if isinstance(content, dict) and "data" in content:'''

          if old3 in content:
              content = content.replace(old3, new3)
              print('✅ 修复3: content 类型安全')
          else:
              print('⚠️  修复3: 未找到匹配代码')

          # 写入修复后的文件
          with open(fp, 'w', encoding='utf-8') as f:
              f.write(content)
          
          print('✅ api_client.py 修复完成')
          PYEOF

      - name: 创建配置文件
        env:
          DOUBAO_COOKIE: ${{ secrets.DOUBAO_COOKIE }}
          DOUBAO_MSTOKEN: ${{ secrets.DOUBAO_MSTOKEN }}
          DOUBAO_A_BOGUS: ${{ secrets.DOUBAO_A_BOGUS }}
        run: |
          python3 -c "
          import json, os
          cfg = {
              'commands': {'draw': '豆包'},
              'auth': {
                  'cookie': os.environ['DOUBAO_COOKIE'],
                  'msToken': os.environ['DOUBAO_MSTOKEN'],
                  'a_bogus': os.environ['DOUBAO_A_BOGUS']
              },
              'storage': {'retention_days': 7},
              'styles': [],
              'params': {'ratios': ['1:1','2:3','4:3','9:16','16:9'], 'default_ratio': '1:1'}
          }
          with open('config.json','w') as f:
              json.dump(cfg,f,ensure_ascii=False,indent=2)
          print('✅ config.json 已生成')
          "

      - name: 运行生图任务
        id: generate
        run: python scripts/generate.py

      - name: 上传结果和日志
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: doubao-results
          path: |
            output/
            logs/